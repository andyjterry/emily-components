<!-- emily-components/atoms: buttons
     Classes generated by emily-css (@layer components).
     Tokens consumed: --color-brand, --color-accent, --color-error, focus ring tokens.
     Rules: <button> for actions, <a> for navigation. Never remove the focus ring.
     Icon-only buttons MUST carry an .sr-only label or aria-label. -->

<!-- Variants -->
<a class="btn btn-primary" href="/contact">Primary action</a>
<a class="btn btn-secondary" href="/services">Secondary action</a>
<button class="btn btn-ghost" type="button">Ghost action</button>
<button class="btn btn-link" type="button">Link-style action</button>
<button class="btn btn-danger" type="button">Delete item</button>

<!-- Sizes -->
<button class="btn btn-primary btn-sm" type="button">Small</button>
<button class="btn btn-primary" type="button">Default</button>
<button class="btn btn-primary btn-lg" type="button">Large</button>

<!-- Full-width (mobile CTAs) -->
<a class="btn btn-primary w-full" href="/quote">Get a quote</a>

<!-- Disabled: use the real attribute, never a class alone -->
<button class="btn btn-primary" type="submit" disabled>Unavailable</button>

<!-- Loading: disable, set aria-busy, swap the label. Toggling is consumer JS. -->
<button class="btn btn-primary" type="submit" disabled aria-busy="true">
  <span class="spinner" aria-hidden="true"></span>
  Sending…
</button>

<!-- Icon-only: square hit area + hidden text label -->
<button class="btn btn-secondary btn-icon" type="button">
  <svg class="fill-current" width="20" height="20" viewBox="0 0 20 20" aria-hidden="true" focusable="false"><path d="M10 2a8 8 0 105.3 14l3.4 3.4 1.3-1.3-3.4-3.4A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
  <span class="sr-only">Search</span>
</button>

<!-- Button with icon: icon decorative, text carries the label -->
<a class="btn btn-primary" href="/quote">
  <svg class="fill-current" width="20" height="20" viewBox="0 0 20 20" aria-hidden="true" focusable="false" style="margin-right: 0.5rem"><path d="M2 4h16v12H2V4zm2 2v8h12V6H4z"/></svg>
  Request a quote
</a>

<!-- Contact-channel buttons: plain hrefs, no JS -->
<a class="btn btn-primary" href="tel:+441234567890">Call 01234 567 890</a>
<a class="btn btn-secondary" href="mailto:hello@example.com">Email us</a>
<a class="btn btn-secondary" href="sms:+441234567890">Text us</a>

<!-- External link: signal the departure in the label -->
<a class="btn btn-secondary" href="https://example.com" rel="noopener">
  Visit example.com <span class="sr-only">(opens external site)</span>
</a>

<!-- Download: name the file type in the label -->
<a class="btn btn-secondary" href="/files/price-guide.pdf" download>Download price guide (PDF)</a>

<!-- Button group: one control cluster, labelled -->
<div class="button-group" role="group" aria-label="Document actions">
  <button class="btn btn-secondary btn-sm" type="button">Save</button>
  <button class="btn btn-secondary btn-sm" type="button">Duplicate</button>
  <button class="btn btn-ghost btn-sm" type="button">Discard</button>
</div>
