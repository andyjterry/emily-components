<!-- emily-components: buttons
     Classes generated by emily-css (@layer components).
     Use <a> for navigation, <button> for actions. -->

<!-- Variants -->
<a class="btn btn-primary" href="/contact">Get a quote</a>
<a class="btn btn-secondary" href="/services">View services</a>
<button class="btn btn-ghost" type="button">Cancel</button>
<button class="btn btn-danger" type="button">Delete</button>

<!-- Sizes -->
<button class="btn btn-primary btn-sm" type="button">Small</button>
<button class="btn btn-primary" type="button">Default</button>
<button class="btn btn-primary btn-lg" type="button">Large</button>

<!-- Disabled / loading (disable and label while submitting) -->
<button class="btn btn-primary" type="submit" disabled aria-disabled="true">Sending…</button>

<!-- Full-width (mobile CTAs) -->
<a class="btn btn-primary w-full" href="tel:+441234567890">Call now</a>

<!-- Button group -->
<div class="button-group">
  <a class="btn btn-primary" href="/quote">Request a quote</a>
  <a class="btn btn-secondary" href="/work">See recent work</a>
</div>
