<!-- emily-components: trust / proof strip
     Accreditation logos or text badges. Use real alt text for logos. -->

<!-- Logo strip -->
<section class="section-sm" aria-label="Accreditations">
  <div class="width-container">
    <ul class="trust-strip">
      <li><img src="/images/placeholders/logo-placeholder.svg" alt="Accreditation body name"></li>
      <li><img src="/images/placeholders/logo-placeholder.svg" alt="Trade association name"></li>
      <li><img src="/images/placeholders/logo-placeholder.svg" alt="Certification scheme name"></li>
    </ul>
  </div>
</section>

<!-- Text badge strip (no logo assets needed) -->
<section class="section-sm" aria-label="Why customers trust us">
  <div class="width-container">
    <ul class="trust-strip">
      <li><span class="badge">Fully insured</span></li>
      <li><span class="badge">10+ years experience</span></li>
      <li><span class="badge">5-star rated</span></li>
      <li><span class="badge">Free quotes</span></li>
    </ul>
  </div>
</section>
