<!-- emily-components: forms
     Labels always associated via for/id. Hints and errors linked with aria-describedby.
     Invalid fields get aria-invalid="true" (styled automatically). -->

<!-- Single field -->
<div class="field-container">
  <label for="name">Full name</label>
  <input class="input" id="name" name="name" type="text" autocomplete="name" required>
</div>

<!-- Field with hint -->
<div class="field-container">
  <label for="phone">Phone number</label>
  <p class="form-hint" id="phone-hint">We only call about your enquiry.</p>
  <input class="input" id="phone" name="phone" type="tel" autocomplete="tel" aria-describedby="phone-hint">
</div>

<!-- Field with error -->
<div class="field-container">
  <label for="email">Email address</label>
  <input class="input" id="email" name="email" type="email" autocomplete="email"
         aria-invalid="true" aria-describedby="email-error" required>
  <span class="form-error-message" id="email-error">Enter an email address in the correct format</span>
</div>

<!-- Textarea -->
<div class="field-container">
  <label for="message">What do you need help with?</label>
  <textarea class="textarea" id="message" name="message" rows="5" required></textarea>
</div>

<!-- Select -->
<div class="field-container">
  <label for="service">Service</label>
  <select class="select" id="service" name="service">
    <option value="">Choose a service</option>
    <option>Repairs</option>
    <option>Installation</option>
    <option>Maintenance</option>
  </select>
</div>

<!-- Checkbox group -->
<fieldset>
  <legend>How should we contact you?</legend>
  <div class="checkbox-group">
    <input class="checkbox" id="contact-email" name="contact" type="checkbox" value="email">
    <label for="contact-email">Email</label>
  </div>
  <div class="checkbox-group">
    <input class="checkbox" id="contact-phone" name="contact" type="checkbox" value="phone">
    <label for="contact-phone">Phone</label>
  </div>
</fieldset>

<!-- Contact / quote form composition -->
<form class="stack" method="post" action="/contact" novalidate>
  <div class="field-container">
    <label for="q-name">Full name</label>
    <input class="input" id="q-name" name="name" type="text" autocomplete="name" required>
  </div>
  <div class="field-container">
    <label for="q-email">Email address</label>
    <input class="input" id="q-email" name="email" type="email" autocomplete="email" required>
  </div>
  <div class="field-container">
    <label for="q-message">Tell us about the job</label>
    <p class="form-hint" id="q-message-hint">Rough size, location, and timing all help.</p>
    <textarea class="textarea" id="q-message" name="message" rows="6" aria-describedby="q-message-hint" required></textarea>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary" type="submit">Send enquiry</button>
    <span class="text-sm text-neutral-60">We reply within one working day.</span>
  </div>
</form>
